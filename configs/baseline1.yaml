# This is the main configuration file for the 'baseline1' experiment.

# In this baseline we fine-tune ResNet-50 on the middle frame of each clip.

defaults:
  - _self_
  - transforms: default_transforms.yaml

# --- Data and DataLoader Configuration ---
batch_size: 64
#num_workers: 7  # for local traning 
num_workers: 4 # for kaggle
pin_memory: false

# --- Training Configuration ---
num_epochs: 100
learning_rate: 0.0015

# --- Learning Rate Scheduler Configuration ---
lr_scheduler:
  name: CosineAnnealingLR
  T_max: ${num_epochs}
  eta_min: 1e-5

# --- Model Configuration ---
# Class names and num_classes are sourced from configs/labels.py at runtime,
# keeping this YAML as the single source for hyper-parameters only.
model:
  name: "resnet50"
  pretrained: true
  weights: "DEFAULT"

# --- Environment and Reproducibility ---
device: cuda
seed: 42

# --- Output Directory ---
hydra:
  run:
    dir: ./runs/baseline1/${now:%Y-%m-%d}/${now:%H-%M-%S}