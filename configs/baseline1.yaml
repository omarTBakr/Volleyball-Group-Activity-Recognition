defaults:
  - _self_
  - transforms: default_transforms.yaml

# Matched to baseline3's per-clip batch size so results are comparable
# across baselines. Note: smaller batches at the same LR mean noisier
# SGD steps — if training gets unstable, lower learning_rate before
# touching batch_size again.
batch_size: 16
num_workers: 4
pin_memory: false

# --- Stage 1: Linear probe (head only) ---
warmup_epochs: 10
warmup_lr: 1e-3

# --- Stage 2: Full fine-tune (differential LR) ---
num_epochs: 100
# Linear-scaled for batch_size 16 (was 1e-3 at batch 64: lr ∝ batch size).
# If you raise batch_size again, scale this back up proportionally.
learning_rate: 2.5e-4   # SGD backbone lr
weight_decay: 1e-4    # bumped from 5e-4 to fight per-video memorization
head_lr_multiplier: 3   # head lr = learning_rate * 3 = 7.5e-4

lr_scheduler:
  name: CosineAnnealingLR
  T_max: ${num_epochs}
  eta_min: 1e-5

label_smoothing: 0.01
early_stopping_patience: 25

model:
  # name: "resnet101" # too much capacity for 24 train videos → per-video memorization
  name: "resnet50"
  pretrained: true
  weights: "DEFAULT"
  dropout: 0   # head dropout to fight overfit

device: cuda
seed: 42

hydra:
  run:
    dir: ./runs/baseline1/${now:%Y-%m-%d}/${now:%H-%M-%S}