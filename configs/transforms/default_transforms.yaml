# Reusable transformation pipeline for all baselines.
#
# Train:  augmentation (random crop, flip, jitter) → tensor → normalize
# Val/Test: deterministic resize + center crop → tensor → normalize
#
# The 224×224 crop size matches the ImageNet input size expected by
# pretrained ResNet / VGG backbones.

train:
  - _target_: torchvision.transforms.Resize
    size: 256

  - _target_: torchvision.transforms.RandomCrop
    size: [224, 224]

  - _target_: torchvision.transforms.RandomHorizontalFlip
    p: 0.5

  - _target_: torchvision.transforms.ColorJitter
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1

  - _target_: torchvision.transforms.ToTensor

  - _target_: torchvision.transforms.Normalize
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

validation:
  - _target_: torchvision.transforms.Resize
    size: 256

  - _target_: torchvision.transforms.CenterCrop
    size: [224, 224]

  - _target_: torchvision.transforms.ToTensor

  - _target_: torchvision.transforms.Normalize
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

test:
  - _target_: torchvision.transforms.Resize
    size: 256

  - _target_: torchvision.transforms.CenterCrop
    size: [224, 224]

  - _target_: torchvision.transforms.ToTensor

  - _target_: torchvision.transforms.Normalize
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]