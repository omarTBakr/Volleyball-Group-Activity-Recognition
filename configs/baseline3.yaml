defaults:
  - _self_
  - transforms: default_transforms.yaml

# Batch size is per-clip; each clip in a batch can carry up to ~12 players,
# so the effective per-step forward count is ~batch_size * P_max.
# Keep this modest to fit ResNet-50 over many crops in GPU memory.
batch_size: 16
num_workers: 4
pin_memory: false
# Use both Kaggle T4s via nn.DataParallel. Each GPU sees batch_size/n_gpus,
# so once enabled you can ~double batch_size before per-GPU memory matches the
# single-GPU peak. Set false to fall back to single-GPU.
data_parallel: true

# --- Stage A: Person-action pretraining (9 classes) ---
# Full ResNet-50 trained end-to-end on per-player crops.
stage_a:
  num_epochs: 100
  learning_rate: 1e-3           # SGD lr for the whole backbone
  weight_decay: 5e-4
  early_stopping_patience: 25
  # Inverse-frequency class weights in CE. Counters the "standing" majority
  # bias so the backbone learns to separate spiking/setting/passing — the
  # actions that actually carry signal for Stage B. Set false for plain CE.
  class_weighted_loss: true

# --- Stage B: Group-activity head fine-tune (8 classes) ---
# Backbone is loaded from Stage A and frozen. Only the MLP head trains.
stage_b:
  num_epochs: 100
  learning_rate: 1e-3           # SGD lr for the MLP head
  weight_decay: 5e-4
  hidden_dim: 512               # MLP hidden width: 2048 → hidden_dim → 8
  dropout: 0.4                  # dropout inside the MLP head
  early_stopping_patience: 25

# Cosine schedule applies to Stage B's optimizer (the part that actually
# updates over a long horizon). Stage A keeps a flat LR.
lr_scheduler:
  name: CosineAnnealingLR
  T_max: ${stage_b.num_epochs}
  eta_min: 1e-5

label_smoothing: 0.01

model:
  name: "resnet50"
  pretrained: true
  weights: "DEFAULT"

device: cuda
seed: 42

hydra:
  run:
    dir: ./runs/baseline3/${now:%Y-%m-%d}/${now:%H-%M-%S}
